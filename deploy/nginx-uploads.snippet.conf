# Nginx upload limits for SCA LMS (VPS: /etc/nginx/sites-enabled/sharifcommerceacademy)
#
# Browser uploads hit POST /api/uploads on the MAIN site (Next.js proxy → API).
# Without client_max_body_size on sharifcommerceacademy.com, nginx defaults to ~1 MB
# and PDFs over ~1 MB fail before the API sees the request.
#
# Apply after git pull:
#   sudo bash deploy/apply-nginx-upload-limits.sh
#
# ── 1) MAIN SITE (sharifcommerceacademy.com) — REQUIRED for admin uploads ──
#
# server {
#     server_name sharifcommerceacademy.com www.sharifcommerceacademy.com;
#
#     client_max_body_size 50m;
#     proxy_read_timeout 300s;
#
#     location / {
#         proxy_pass http://127.0.0.1:3003;
#         ...
#     }
# }
#
# ── 2) API SITE (api.sharifcommerceacademy.com) — serve stored files ──
#
# server {
#     server_name api.sharifcommerceacademy.com;
#
#     client_max_body_size 50m;
#
#     location /uploads/ {
#         alias /var/www/sca-lms/uploads/;
#         add_header Cache-Control "public, max-age=604800";
#         add_header Cross-Origin-Resource-Policy "cross-origin";
#     }
#
#     location / {
#         proxy_pass http://127.0.0.1:4001;
#         ...
#     }
# }
