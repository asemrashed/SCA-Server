# Add inside your server { } block (e.g. api.sharifcommerceacademy.com).
# Option A — nginx serves files directly (recommended for large PDFs):

client_max_body_size 50m;

location /uploads/ {
    alias /var/www/sca-lms/uploads/;
    add_header Cache-Control "public, max-age=604800";
    add_header Cross-Origin-Resource-Policy "cross-origin";
}

# Option B — proxy /uploads to Node (if not using alias above):
# location /uploads/ {
#     proxy_pass http://127.0.0.1:4001/uploads/;
#     proxy_read_timeout 300s;
#     client_max_body_size 50m;
# }

# POST /api/uploads still proxies to the Node API as usual.
